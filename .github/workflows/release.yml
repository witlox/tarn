name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build, Sign & Notarize
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Generate Xcode project
        run: brew install xcodegen && xcodegen generate

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profiles
        env:
          APP_PROFILE: ${{ secrets.APP_PROVISIONING_PROFILE }}
          SYSEXT_PROFILE: ${{ secrets.SYSEXT_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/tarn_app.provisionprofile
          echo "$SYSEXT_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/tarn_sysext.provisionprofile

      - name: Build archive
        run: |
          xcodebuild archive \
            -project Tarn.xcodeproj \
            -scheme TarnApp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Tarn.xcarchive \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="Developer ID Application"

      - name: Export app
        run: |
          cat > $RUNNER_TEMP/export.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Tarn.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/export.plist

      - name: Create DMG
        run: |
          mkdir -p $RUNNER_TEMP/dmg-stage
          cp -R $RUNNER_TEMP/export/Tarn.app $RUNNER_TEMP/dmg-stage/
          ln -s /Applications $RUNNER_TEMP/dmg-stage/Applications
          hdiutil create \
            -volname "Tarn" \
            -srcfolder $RUNNER_TEMP/dmg-stage \
            -ov -format UDZO \
            $RUNNER_TEMP/Tarn-${GITHUB_REF_NAME}.dmg

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit $RUNNER_TEMP/Tarn-${GITHUB_REF_NAME}.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple $RUNNER_TEMP/Tarn-${GITHUB_REF_NAME}.dmg

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${GITHUB_REF_NAME} \
            $RUNNER_TEMP/Tarn-${GITHUB_REF_NAME}.dmg \
            --title "Tarn ${GITHUB_REF_NAME}" \
            --generate-notes
