name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build, Sign & Notarize
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Generate Xcode project
        run: brew install xcodegen && xcodegen generate

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild build \
            -project Tarn.xcodeproj \
            -scheme TarnApp \
            -configuration Release \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime"

      - name: Locate app
        run: |
          APP_PATH=$(find $RUNNER_TEMP/DerivedData -name "Tarn.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found: $APP_PATH"
          codesign -dvv "$APP_PATH" 2>&1 | head -5

      - name: Create DMG
        run: |
          mkdir -p $RUNNER_TEMP/dmg-stage
          cp -R "$APP_PATH" $RUNNER_TEMP/dmg-stage/
          ln -s /Applications $RUNNER_TEMP/dmg-stage/Applications
          DMG_PATH=$RUNNER_TEMP/Tarn-${GITHUB_REF_NAME}.dmg
          hdiutil create \
            -volname "Tarn" \
            -srcfolder $RUNNER_TEMP/dmg-stage \
            -ov -format UDZO \
            "$DMG_PATH"
          codesign --sign "Developer ID Application" --timestamp "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${GITHUB_REF_NAME} \
            "$DMG_PATH" \
            --title "Tarn ${GITHUB_REF_NAME}" \
            --generate-notes
