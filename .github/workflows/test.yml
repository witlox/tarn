name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build TarnCore
        run: swift build --target TarnCore

      - name: Build TarnCLI
        run: swift build --target TarnCLI

      - name: Run tests
        run: swift test --enable-code-coverage

      - name: Generate coverage report
        run: |
          BIN=$(swift build --show-bin-path)
          PROFDATA=$(find .build -name 'default.profdata' -type f | head -1)
          xcrun llvm-cov export \
            "$BIN/TarnPackageTests.xctest/Contents/MacOS/TarnPackageTests" \
            -instr-profile "$PROFDATA" \
            -format lcov \
            -ignore-filename-regex '\.build|Tests' \
            > coverage.lcov 2>/dev/null || true

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage.lcov
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
