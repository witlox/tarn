included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData

disabled_rules:
  - trailing_comma
  - todo
  - line_length

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional

force_unwrapping:
  severity: error

identifier_name:
  min_length: 2
  excluded:
    - id
    - ip
    - fd
    - fm
    - ai

type_name:
  min_length: 2

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100
