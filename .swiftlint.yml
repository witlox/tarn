included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData

disabled_rules:
  - trailing_comma
  - todo
  - line_length
  - inclusive_language
  - for_where
  - non_optional_string_data_conversion
  - force_cast
  - unused_closure_parameter

opt_in_rules:
  - empty_count
  - closure_spacing

identifier_name:
  min_length: 2
  excluded:
    - id
    - ip
    - fd
    - fm
    - ai

type_name:
  min_length: 2

file_length:
  warning: 500
  error: 800

cyclomatic_complexity:
  warning: 15
  error: 20

function_body_length:
  warning: 80
  error: 120
