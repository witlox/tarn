name: Tarn
options:
  bundleIdPrefix: com.witlox.tarn
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CURRENT_PROJECT_VERSION: "27"

packages:
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser.git
    from: "1.3.0"

targets:

  # Shared policy library — pure Foundation, no system framework deps
  TarnCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/TarnCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.witlox.tarn.core
        SKIP_INSTALL: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        MACH_O_TYPE: staticlib

  # Unprivileged CLI
  TarnCLI:
    type: tool
    platform: macOS
    sources:
      - path: Sources/TarnCLI
    dependencies:
      - target: TarnCore
      - package: ArgumentParser
    settings:
      base:
        PRODUCT_NAME: tarn
        PRODUCT_BUNDLE_IDENTIFIER: com.witlox.tarn.cli

  # ES system extension: Endpoint Security client + XPC service for CLI and NE
  TarnES:
    type: system-extension
    platform: macOS
    sources:
      - path: Sources/TarnES
    dependencies:
      - target: TarnCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.witlox.tarn.es
        PRODUCT_NAME: com.witlox.tarn.es
        CODE_SIGN_ENTITLEMENTS: Resources/TarnES.entitlements
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: Tarn ES
        SYSTEM_EXTENSION_API_USAGE: "YES"
        OTHER_LDFLAGS: ["-lbsm", "-lEndpointSecurity"]
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
    info:
      path: Resources/TarnES-Info.plist
      properties:
        CFBundlePackageType: SYSX
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSSystemExtensionUsageDescription: Tarn ES extension for file and process supervision
        MachServices:
          group.com.witlox.tarn.es: true
          group.com.witlox.tarn.es.bridge: true

  # NE system extension: thin network filter proxy, forwards to TarnES via XPC
  TarnSupervisor:
    type: system-extension
    platform: macOS
    sources:
      - path: Sources/TarnSupervisor
        excludes:
          - "main.swift"
          - "ESClient.swift"
          - "XPCService.swift"
    dependencies:
      - target: TarnCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.witlox.tarn.supervisor
        PRODUCT_NAME: com.witlox.tarn.supervisor
        CODE_SIGN_ENTITLEMENTS: Resources/TarnSupervisor.entitlements
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: Tarn Supervisor
        SYSTEM_EXTENSION_API_USAGE: "YES"
        OTHER_LDFLAGS: ["-lbsm"]
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
    info:
      path: Resources/TarnSupervisor-Info.plist
      properties:
        CFBundlePackageType: SYSX
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSSystemExtensionUsageDescription: Tarn system extension for file and network supervision
        NetworkExtension:
          NEProviderClasses:
            com.apple.networkextension.filter-data: "$(PRODUCT_MODULE_NAME).NetworkFilter"
          NEMachServiceName: "group.com.witlox.tarn.supervisor"
          NEFilterDataProviderDesignatedRequirement: >
            identifier "com.witlox.tarn.supervisor"
            and anchor apple generic

  # Host app bundle (LSUIElement, no UI)
  TarnApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/TarnApp
      - path: Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: TarnCore
      - target: TarnES
        embed: true
        codeSign: true
        buildPhase:
          copyFiles:
            destination: systemExtensionsPlugins
      - target: TarnSupervisor
        embed: true
        codeSign: true
        buildPhase:
          copyFiles:
            destination: systemExtensionsPlugins
      - target: TarnCLI
        embed: true
        codeSign: true
        buildPhase:
          copyFiles:
            destination: executables
    settings:
      base:
        PRODUCT_NAME: Tarn
        PRODUCT_BUNDLE_IDENTIFIER: com.witlox.tarn
        CODE_SIGN_ENTITLEMENTS: Resources/TarnApp.entitlements
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: Tarn App
        INFOPLIST_FILE: Resources/TarnApp-Info.plist
    info:
      path: Resources/TarnApp-Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Tarn
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication

  # Unit tests
  TarnCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/TarnCoreTests
    dependencies:
      - target: TarnCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.witlox.tarn.core-tests

  # Integration tests (SIP-disabled VM)
  TarnIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/TarnIntegrationTests
    dependencies:
      - target: TarnCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.witlox.tarn.integration-tests
        GENERATE_INFOPLIST_FILE: "YES"
